# yaml-language-server: $schema=https://testingcf.jsdelivr.net/gh/StageDog/tavern_sync/dist/schema/character.zh.json
头像: null
版本: 1.0.0
作者: huangdimoniqi
备注: 皇帝模拟器 · 天镜阁沙盒文字RPG

第一条消息:
  - 文件: 第一条消息/0

角色描述: ''

锚点:
  - &分隔符
    启用: false
    激活策略:
      类型: 向量化
    插入位置:
      类型: 角色定义之前
      顺序: 14720
    激活概率: 100
    内容: ''

世界书名称: 皇帝模拟器
条目:
  - 文件夹: 变量
    条目:
      - 名称: ===变量开始===
        <<: *分隔符

      - 名称: '[initvar]变量初始化勿开'
        启用: false
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 角色定义之前
          顺序: 14720
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/变量/initvar

      - 名称: 变量列表
        启用: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          角色: 系统
          深度: 0
          顺序: 14720
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/变量/变量列表

      - 名称: '[mvu_update]变量更新规则'
        启用: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          角色: 系统
          深度: 0
          顺序: 14720
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/变量/变量更新规则

      - 名称: '[mvu_update]变量输出格式'
        启用: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 指定深度
          角色: 系统
          深度: 0
          顺序: 14720
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/变量/变量输出格式

      - 名称: ===变量结束===
        <<: *分隔符

  - 文件夹: 角色
    条目:
      - 名称: ===角色开始===
        <<: *分隔符

      - 名称: 角色详情
        启用: true
        激活策略:
          类型: 蓝灯
        插入位置:
          类型: 角色定义之后
          顺序: 14720
        递归:
          不可被其他条目激活: true
          不可激活其他条目: true
        文件: 世界书/角色/角色详情

      - 名称: ===角色结束===
        <<: *分隔符

扩展字段:
  正则:
    - 正则名称: '[不发送]去除变量更新'
      id: huangdi-strip-update
      启用: true
      查找表达式: /<update(?:variable)?>(?:(?!.*<\/update(?:variable)?>).*$|.*<\/update(?:variable)?>)/gsi
      内容: ''
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: false
        仅格式提示词: true
      最大深度: 3

    - 正则名称: '[折叠]变量更新中'
      id: huangdi-fold-update-pending
      启用: true
      查找表达式: /<update(?:variable)?>(?!.*<\/update(?:variable)?>)\s*(.*)\s*$/gsi
      内容: |-

        <details>
        <summary>变量更新中{{random::.::..::...}}</summary>
        $1
        </details>
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

    - 正则名称: '[折叠]完整变量更新'
      id: huangdi-fold-update-done
      启用: true
      查找表达式: /<update(?:variable)?>\s*(.*)\s*<\/update(?:variable)?>/gsi
      内容: |-

        <details>
        <summary>变量更新情况</summary>
        $1
        </details>
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

    - 正则名称: '[界面]皇帝模拟器'
      id: huangdi-iframe-ui
      启用: true
      查找表达式: <StatusPlaceHolderImpl/>
      内容: |-
        ```
        <body>
        <script>
        $('body').load('http://127.0.0.1:5500/huangdimoniqi/界面/模拟器/index.html')
        </script>
        </body>
        ```
      来源:
        用户输入: false
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

  酒馆助手:
    脚本库:
      - 名称: mvu
        id: huangdi-mvu
        启用: true
        类型: 脚本
        内容: |-
          import 'https://testingcf.jsdelivr.net/gh/MagicalAstrogy/MagVarUpdate/artifact/bundle.js';

      - 名称: 变量结构
        id: huangdi-schema
        启用: true
        类型: 脚本
        内容: |-
          import 'http://127.0.0.1:5500/huangdimoniqi/脚本/变量结构/index.js'
